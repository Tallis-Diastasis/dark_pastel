[colors]
S1 = #23232F
S2 = #3B3B4D
S3 = #B6C2E2
S4 = #CDDBF9
Pop1 = #F6BBE7
Pop2 = #EC6FCD
SubPop1 = #487BEA

[bar/bar1]
width = 100%
height = 30
raduis = 6

background = ${colors.S1}
foreground = ${colors.S4}

line-size = 3pt

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = DM Mono

modules-left = xworkspaces xwindow
modules-right = pulseaudio wlan battery shutdown
modules-center = date

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.SubPop1}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.Pop1}
label-active-foreground = ${colors.S2}
label-active-underline = ${colors.Pop2}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.Pop2}
label-urgent-padding = 1

label-empty = %name%
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.SubPop1}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.Pop1}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.S4}

label-muted = muted
label-muted-foreground = ${colors.S3}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = disconnected
label-disconnected-foreground = ${colors.Pop2}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %essid%
label-connected-foreground = ${colors.SubPop1}

[module/battery]
type = custom/script
exec = bat
interval = 90
label = %output%

[module/shutdown]
type = custom/script
exec = echo "Hi"
click-left = power_menu
label = "(*)"
format-foreground = ${colors.Pop1}
